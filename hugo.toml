baseURL = "https://cacing69.github.io/"
title = "Ibnul Mutaki"
theme = "risotto"

# Multilingual configuration
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1
    title = "Ibnul Mutaki"

    [languages.en.params]
      description = "Software Developer & Open Source Enthusiast"

    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10

  [languages.id]
    languageCode = "id-ID"
    languageName = "Indonesia"
    weight = 2
    title = "Ibnul Mutaki"

    [languages.id.params]
      description = "Pengembang Perangkat Lunak & Open Source Enthusiast"

    [[languages.id.menu.main]]
      identifier = "posts"
      name = "Artikel"
      url = "/posts/"
      weight = 10

# Automatically add content sections to main menu
sectionPagesMenu = "main"

[pagination]
pagerSize = 5

[params]
noindex = false

[params.theme]
palette = "base16-dark"

# Sidebar: about/bio
[params.about]
title = "Ibnul Mutaki"
description = "Software Developer & Open Source Enthusiast"
logo = "👨‍💻"

# Sidebar: social links
[[params.socialLinks]]
icon = "fa-brands fa-github"
title = "GitHub"
url = "https://github.com/cacing69"

[[params.socialLinks]]
icon = "fa-solid fa-envelope"
title = "Email"
url = "mailto:ibnulmutaki@example.com"

[taxonomies]
category = "categories"
tag = "tags"
series = "series"