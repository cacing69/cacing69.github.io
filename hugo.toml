baseURL = "https://cacing69.github.io/"
locale = "en-us"
title = "Ibnul Mutaki"
theme = "risotto"

# Automatically add content sections to main menu
sectionPagesMenu = "main"

[pagination]
pagerSize = 5

[params]
noindex = false

[params.theme]
palette = "base16-dark"

# Sidebar: about/bio
[params.about]
title = "Ibnul Mutaki"
description = "Software Developer & Open Source Enthusiast"
logo = "👨‍💻"

# Sidebar: social links
[[params.socialLinks]]
icon = "fa-brands fa-github"
title = "GitHub"
url = "https://github.com/cacing69"

[[params.socialLinks]]
icon = "fa-solid fa-envelope"
title = "Email"
url = "mailto:ibnulmutaki@example.com"

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "profile"
    name = "Profile"
    url = "/profile/"
    weight = 20