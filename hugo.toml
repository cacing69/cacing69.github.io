baseURL = "https://cacing69.github.io/"
title = "Ibnul Mutaki"
theme = "risotto"

# SEO Configuration
enableRobotsTXT = true
enableGitInfo = true
canonifyURLs = true

# Multilingual configuration
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1
    title = "Ibnul Mutaki - Software Developer & Open Source Enthusiast"

    [languages.en.params]
      description = "Personal blog of Ibnul Mutaki - Software Developer & Open Source Enthusiast. Articles about software development, web technologies, and open source."
      keywords = ["Ibnul Mutaki", "software developer", "web development", "open source", "blog", "programming", "Hugo", "JavaScript", "TypeScript"]
      author = "Ibnul Mutaki"

    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10

  [languages.id]
    languageCode = "id-ID"
    languageName = "Indonesia"
    weight = 2
    title = "Ibnul Mutaki - Pengembang Perangkat Lunak"

    [languages.id.params]
      description = "Blog pribadi Ibnul Mutaki - Pengembang Perangkat Lunak & Open Source Enthusiast. Artikel tentang pengembangan perangkat lunak, teknologi web, dan open source."
      keywords = ["Ibnul Mutaki", "pengembang perangkat lunak", "pengembangan web", "open source", "blog", "programming", "Hugo", "JavaScript", "TypeScript"]
      author = "Ibnul Mutaki"

    [[languages.id.menu.main]]
      identifier = "posts"
      name = "Artikel"
      url = "/posts/"
      weight = 10

# Automatically add content sections to main menu
sectionPagesMenu = "main"

[pagination]
pagerSize = 5

[params]
noindex = false

[params.theme]
palette = "base16-dark"

# Sidebar: about/bio
[params.about]
title = "Ibnul Mutaki"
description = "Software Developer & Open Source Enthusiast"
logo = "👨‍💻"

# Sidebar: social links
[[params.socialLinks]]
icon = "fa-brands fa-github"
title = "GitHub"
url = "https://github.com/cacing69"

[[params.socialLinks]]
icon = "fa-solid fa-envelope"
title = "Email"
url = "mailto:ibnulmutaki@example.com"

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

# Privacy settings for SEO
[privacy.youtube]
disabled = false
privacyEnhanced = true

[privacy.x]
disabled = false
enableDNT = true

[privacy.vimeo]
disabled = false
simple = true

[services.x]
disableInlineCSS = true

[services.instagram]
disableInlineCSS = true
